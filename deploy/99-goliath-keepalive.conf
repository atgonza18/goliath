# Goliath TCP keepalive tuning
# Prevents Hetzner Cloud NAT 300s idle timeout from killing Claude CLI connections.
# Hetzner NAT drops TCP sessions idle for 300+ seconds; Claude Opus extended thinking
# creates silent API connections with no data flow, causing ECONNRESET after 300s.
# These settings cause the kernel to send keepalive probes every 60s, keeping NAT alive.
#
# To apply: sudo sysctl -p /etc/sysctl.d/99-goliath-keepalive.conf
# Or copy:  sudo cp /opt/goliath/deploy/99-goliath-keepalive.conf /etc/sysctl.d/
#           sudo sysctl -p /etc/sysctl.d/99-goliath-keepalive.conf
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6
