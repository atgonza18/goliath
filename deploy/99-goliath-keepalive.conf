# GOLIATH TCP Keepalive Settings
# Applied 2026-03-05 to prevent Hetzner NAT from dropping idle connections.
#
# Problem: Hetzner's NAT gateway drops idle TCP connections after ~300 seconds.
# Claude CLI agent runs can have long periods with no data flow during thinking,
# causing the NAT to silently drop the connection. The agent then hangs until
# the application-level timeout fires.
#
# Solution: Aggressive TCP keepalive probes keep the connection alive through
# NAT idle timeouts. Probes start at 60s, retry every 10s, give up after 6 fails.
# Total detection time: 60 + (10 * 6) = 120 seconds.
#
# Default values were: time=7200 intvl=75 probes=9 (first probe after 2 HOURS)

# Send first keepalive probe after 60 seconds of idle
net.ipv4.tcp_keepalive_time = 60

# Send subsequent probes every 10 seconds
net.ipv4.tcp_keepalive_intvl = 10

# Give up after 6 failed probes (60s total after first probe)
net.ipv4.tcp_keepalive_probes = 6
