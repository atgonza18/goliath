# =============================================================================
# Goliath App Builder — Traefik Reverse Proxy
# =============================================================================
# This compose file runs Traefik v3 as the reverse proxy for all deployed apps.
# It auto-discovers Docker containers, provisions SSL via Let's Encrypt,
# and routes traffic based on container labels (wildcard subdomains).
#
# Usage:
#   GOLIATH_DOMAIN=yourdomain.com ACME_EMAIL=you@example.com \
#     docker compose -f docker-compose.traefik.yml up -d
#
# Requires:
#   - Docker Engine 24+
#   - Docker Compose v2
#   - Wildcard DNS: *.yourdomain.com → server IP
#   - Port 80 and 443 available on the host
# =============================================================================

networks:
  goliath-apps:
    name: goliath-apps
    driver: bridge

services:
  traefik:
    image: traefik:v3.2
    container_name: goliath-traefik
    restart: unless-stopped

    command:
      # --- API / Dashboard ---
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # --- Entrypoints ---
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # --- HTTP → HTTPS redirect (global) ---
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"

      # --- Let's Encrypt (ACME) ---
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?Set ACME_EMAIL in .env}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

      # --- Docker provider ---
      - "--providers.docker=true"
      - "--providers.docker.network=goliath-apps"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.watch=true"

      # --- Logging ---
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-letsencrypt:/letsencrypt"
      - "traefik-logs:/var/log/traefik"

    networks:
      - goliath-apps

    labels:
      # --- Traefik Dashboard (protected by BasicAuth) ---
      - "traefik.enable=true"

      # Dashboard router — accessible at traefik.${GOLIATH_DOMAIN}
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${GOLIATH_DOMAIN:?Set GOLIATH_DOMAIN in .env}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"

      # BasicAuth middleware — password set via TRAEFIK_DASHBOARD_AUTH
      # Generate with: htpasswd -nb admin yourpassword
      # Default: admin:admin (CHANGE THIS!)
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:$$apr1$$xyz$$placeholder}"

    environment:
      - GOLIATH_DOMAIN=${GOLIATH_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}

    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  traefik-letsencrypt:
    name: goliath-traefik-letsencrypt
  traefik-logs:
    name: goliath-traefik-logs
